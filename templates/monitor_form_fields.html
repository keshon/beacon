{# Shared monitor fields for add and inline edit. Expects: mode = "add"|"edit"; in edit, loop variable m must be in scope. #}
<div class="row g-2 align-items-end">
    <div class="col-md-2">
        <label class="form-label small">Name</label>
        <input
            type="text"
            class="form-control"
            name="name"
            {% if mode == "add" %}
            placeholder="e.g. Google"
            required
            {% else %}
            placeholder="Name"
            {% endif %}
        />
    </div>
    <div class="col-md-2">
        <label class="form-label small">Type</label>
        <select
            class="form-select"
            name="type"
        >
            <option value="http">HTTP</option>
            <option value="tcp">TCP</option>
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label small">Target</label>
        <input
            type="text"
            class="form-control"
            name="target"
            {% if mode == "add" %}
            placeholder="https://example.com or host:443"
            required
            {% else %}
            placeholder="Target"
            {% endif %}
        />
    </div>
    <div class="col-md-2">
        <label class="form-label small">Interval (sec)</label>
        <input
            type="number"
            class="form-control"
            name="interval"
            min="0"
            placeholder="default"
        />
    </div>
    <div class="col-md-2">
        {% if mode == "add" %}
        <button
            type="submit"
            class="btn btn-primary w-100 d-grid"
        >
            Add
        </button>
        {% else %}
        <button type="submit" class="btn btn-primary w-100">Save</button>
        {% endif %}
    </div>
</div>
{% if mode == "add" %}
<div class="mt-3">
    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#addAdvanced">
        <i class="bi bi-chevron-down"></i>
        Notification overrides
    </button>
    <div class="collapse mt-2" id="addAdvanced">
        <div class="row g-2 pt-1">
            <div class="col-md-4">
                <label class="form-label small">Telegram token</label>
                <input
                    type="text"
                    class="form-control"
                    name="tg_token"
                    placeholder="Leave empty for global"
                />
            </div>
            <div class="col-md-4">
                <label class="form-label small">Telegram chat ID</label>
                <input
                    type="text"
                    class="form-control"
                    name="tg_chat_id"
                    placeholder="Leave empty for global"
                />
            </div>
            <div class="col-md-4">
                <label class="form-label small">Discord webhook</label>
                <input
                    type="text"
                    class="form-control"
                    name="discord_webhook"
                    placeholder="Leave empty for global"
                />
            </div>
        </div>
    </div>
</div>
{% else %}
<div class="mt-2">
    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#editAdvanced-{{ m.ID }}">
        <i class="bi bi-chevron-down"></i>
        Notification overrides
    </button>
    <div
        class="collapse mt-2"
        id="editAdvanced-{{ m.ID }}"
    >
        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label small">Telegram token</label>
                <input
                    type="text"
                    class="form-control"
                    name="tg_token"
                    placeholder="Override token"
                />
            </div>
            <div class="col-md-4">
                <label class="form-label small">Telegram chat ID</label>
                <input
                    type="text"
                    class="form-control"
                    name="tg_chat_id"
                    placeholder="Override chat ID"
                />
            </div>
            <div class="col-md-4">
                <label class="form-label small">Discord webhook</label>
                <input
                    type="text"
                    class="form-control"
                    name="discord_webhook"
                    placeholder="Override webhook"
                />
            </div>
        </div>
    </div>
</div>
{% endif %}
