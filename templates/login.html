<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Beacon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --accent: #6366f1;
            --accent-hover: #4f52e0;
            --accent-light: rgba(99, 102, 241, 0.12);
            --radius: 10px;
            --font: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font);
            min-height: 100vh;
            background: #0b0d13;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        /* Background glow blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.18);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: rgba(16, 185, 129, 0.12);
            bottom: -50px;
            right: -50px;
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .logo-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(16px);
        }

        .login-card h1 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .login-card .subtitle {
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1.75rem;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            display: block;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font);
            font-size: 0.875rem;
            padding: 10px 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-control:focus {
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .mb-field {
            margin-bottom: 1rem;
        }

        .btn-login {
            display: block;
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 11px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            margin-top: 1.5rem;
            letter-spacing: 0.01em;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .btn-login:active {
            transform: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: var(--radius);
            color: #fca5a5;
            font-size: 0.8125rem;
            padding: 10px 14px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="login-wrap">
        <div class="login-logo">
            <div class="logo-icon"><i class="bi bi-activity"></i></div>
            <span class="logo-name">Beacon</span>
        </div>

        <div class="login-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to your account</p>

            {% if error %}
            <div class="alert-error">
                <i class="bi bi-shield-exclamation"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-field">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus autocomplete="username">
                </div>
                <div class="mb-field">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
