<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Beacon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/uikit.css">
</head>
<body class="login-page">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="login-wrap">
        <div class="login-logo">
            <div class="logo-icon"><i class="bi bi-activity"></i></div>
            <span class="logo-name">Beacon</span>
        </div>

        <div class="login-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to your account</p>

            {% if error %}
            <div class="alert alert-danger">
                <i class="bi bi-shield-exclamation"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
