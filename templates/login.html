<!DOCTYPE html>
<html lang="en">
<head>
    {% include "beacon_head_theme.html" %}
    {% include "head_common.html" %}
    <title>Login – Beacon</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%236366f1'/%3E%3C/svg%3E" />
</head>
<body class="login-page">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="login-wrap">
        <div class="login-logo">
            <div class="logo-icon"><i class="bi bi-activity"></i></div>
            <span class="logo-name">Beacon</span>
        </div>

        <div class="login-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to your account</p>

            {% if error %}
            <div class="alert alert-danger">
                <i class="bi bi-shield-exclamation"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
