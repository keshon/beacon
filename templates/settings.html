{% extends "base.html" %}
{% block title %}Settings – Beacon{% endblock %}
{% block content %}
<div class="container">
    <div class="d-flex align-items-center justify-content-between mb-4 anim-fadeup">
        <h1 class="page-title mb-0">Settings</h1>
    </div>

    <form id="configForm">
        <div class="row g-3">
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Appearance</p>
                        <div class="row g-2 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label small" for="ui_font_size">Base font size</label>
                                <select class="form-select" id="ui_font_size">
                                    <option value="0.8125rem">13px</option>
                                    <option value="0.875rem">14px</option>
                                    <option value="0.9375rem">15px</option>
                                    <option value="1rem">16px</option>
                                    <option value="1.0625rem">17px</option>
                                    <option value="1.125rem">18px</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-outline-secondary" id="ui_font_reset">Reset</button>
                            </div>
                            <div class="col-md-4">
                                <div class="small text-muted" id="ui_font_hint">Applies instantly, saved in this browser.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Server</p>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label small">Listen address</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="listen"
                                    placeholder=":8080"
                                />
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Workers</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    name="workers"
                                    min="1"
                                    placeholder="10"
                                />
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Default check interval (sec)</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    name="default_interval"
                                    min="0"
                                    placeholder="30"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Auth</p>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <label class="form-label small">Username</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="username"
                                />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small">Password</label>
                                <input
                                    type="password"
                                    class="form-control"
                                    name="password"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Telegram</p>
                        <div class="form-check mb-2">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="telegram_enabled"
                                id="telegram_enabled"
                            />
                            <label
                                class="form-check-label small"
                                for="telegram_enabled"
                                >Enabled</label
                            >
                        </div>
                        <div class="row g-2">
                            <div class="col-12">
                                <label class="form-label small">Bot token</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="telegram_token"
                                    placeholder="Bot token"
                                />
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Chat ID</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="telegram_chat_id"
                                    placeholder="Chat ID"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Discord</p>
                        <div class="form-check mb-2">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="discord_enabled"
                                id="discord_enabled"
                            />
                            <label
                                class="form-check-label small"
                                for="discord_enabled"
                                >Enabled</label
                            >
                        </div>
                        <div>
                            <label class="form-label small">Webhook URL</label>
                            <input
                                type="text"
                                class="form-control"
                                name="discord_webhook"
                                placeholder="Webhook URL"
                            />
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card anim-fadeup anim-delay-1">
                    <div class="card-body">
                        <p class="section-label">Network (federation)</p>
                        <div class="form-check mb-2">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="network_enabled"
                                id="network_enabled"
                            />
                            <label
                                class="form-check-label small"
                                for="network_enabled"
                                >Enable peer sync</label
                            >
                        </div>
                        <div class="row g-2">
                            <div class="col-12">
                                <label class="form-label small">Self URL</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="network_self_url"
                                    placeholder="https://beacon1.example.com"
                                />
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Peers (one URL per line)</label>
                                <textarea
                                    class="form-control"
                                    name="network_peers"
                                    rows="3"
                                    placeholder="https://beacon2.example.com"
                                ></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Sync interval (sec)</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    name="network_sync_interval"
                                    min="10"
                                    placeholder="60"
                                />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Dead timeout (sec)</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    name="network_dead_timeout"
                                    min="60"
                                    placeholder="300"
                                />
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Node ID</label>
                                <input
                                    type="text"
                                    class="form-control bg-light"
                                    name="network_node_id"
                                    readonly
                                    placeholder="Generated when enabled"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 d-flex align-items-center gap-2">
                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Save settings
                </button>
                <span
                    id="msg"
                    class="small"
                ></span>
            </div>
        </div>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
    (function () {
        (function initUiFontSize() {
            var select = document.getElementById('ui_font_size');
            var reset = document.getElementById('ui_font_reset');
            if (!select || !reset) return;

            function apply(v) {
                document.documentElement.style.setProperty('--ui-font-size', v);
            }

            function getDefault() {
                return '0.9375rem';
            }

            try {
                var saved = localStorage.getItem('uiFontSize') || getDefault();
                select.value = saved;
                apply(saved);
            } catch (e) {
                select.value = getDefault();
                apply(getDefault());
            }

            select.addEventListener('change', function () {
                var v = select.value || getDefault();
                apply(v);
                try {
                    localStorage.setItem('uiFontSize', v);
                } catch (e) {}
            });

            reset.addEventListener('click', function () {
                var v = getDefault();
                select.value = v;
                apply(v);
                try {
                    localStorage.setItem('uiFontSize', v);
                } catch (e) {}
            });
        })();

        function fieldByName(form, name) {
            return form.querySelector('[name="' + name + '"]');
        }
        fetch('/api/config')
            .then((r) => r.json())
            .then((cfg) => {
                const f = document.getElementById('configForm');
                fieldByName(f, 'listen').value = cfg.listen || ':8080';
                fieldByName(f, 'workers').value = cfg.workers || 10;
                fieldByName(f, 'default_interval').value = cfg.default_interval || '';
                fieldByName(f, 'username').value = cfg.auth?.username || '';
                fieldByName(f, 'password').value = cfg.auth?.password || '';
                fieldByName(f, 'telegram_enabled').checked = cfg.telegram?.enabled || false;
                fieldByName(f, 'telegram_token').value = cfg.telegram?.token || '';
                fieldByName(f, 'telegram_chat_id').value = cfg.telegram?.chat_id || '';
                fieldByName(f, 'discord_enabled').checked = cfg.discord?.enabled || false;
                fieldByName(f, 'discord_webhook').value = cfg.discord?.webhook || '';
                fieldByName(f, 'network_enabled').checked = cfg.network?.enabled || false;
                fieldByName(f, 'network_self_url').value = cfg.network?.self_url || '';
                fieldByName(f, 'network_peers').value = (cfg.network?.peers || []).join('\n');
                fieldByName(f, 'network_sync_interval').value = cfg.network?.sync_interval || '';
                fieldByName(f, 'network_dead_timeout').value = cfg.network?.dead_timeout || '';
                fieldByName(f, 'network_node_id').value = cfg.network?.node_id || '';

                bindToggle('telegram_enabled');
                bindToggle('discord_enabled');
                bindToggle('network_enabled');
            });
    })();
    document.getElementById('configForm').onsubmit = async (e) => {
        e.preventDefault();
        const f = e.target;
        function namedField(name) {
            return f.querySelector('[name="' + name + '"]');
        }
        const msg = document.getElementById('msg');
        msg.textContent = 'Saving…';
        msg.className = 'small text-muted';
        const peersRaw = (namedField('network_peers').value || '')
            .trim()
            .split('\n')
            .map((s) => s.trim())
            .filter(Boolean);
        const cfg = {
            listen: namedField('listen').value || ':8080',
            workers: parseInt(namedField('workers').value) || 10,
            default_interval: parseInt(namedField('default_interval').value) || 0,
            auth: { username: namedField('username').value, password: namedField('password').value },
            telegram: { enabled: namedField('telegram_enabled').checked, token: namedField('telegram_token').value, chat_id: namedField('telegram_chat_id').value },
            discord: { enabled: namedField('discord_enabled').checked, webhook: namedField('discord_webhook').value },
            network: {
                enabled: namedField('network_enabled').checked,
                self_url: namedField('network_self_url').value.trim(),
                peers: peersRaw,
                sync_interval: parseInt(namedField('network_sync_interval').value) || 60,
                dead_timeout: parseInt(namedField('network_dead_timeout').value) || 300,
                node_id: namedField('network_node_id').value.trim(),
            },
        };
        const res = await fetch('/api/config', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cfg),
        });
        if (res.ok) {
            const saved = await res.json();
            if (saved.network?.node_id) namedField('network_node_id').value = saved.network.node_id;
            msg.textContent = 'Saved';
            msg.className = 'small text-success';
        } else {
            msg.textContent = 'Error.';
            msg.className = 'small text-danger';
        }
    };
    function bindToggle(sectionCheckboxName) {
        const f = document.getElementById('configForm');
        const checkbox = f.querySelector('[name="' + sectionCheckboxName + '"]');
        if (!checkbox) {
            return;
        }

        const card = checkbox.closest('.card');
        if (!card) {
            return;
        }

        function update() {
            const fields = card.querySelectorAll('input, textarea, select');

            fields.forEach(function (field) {
                if (field === checkbox) {
                    return;
                }

                if (checkbox.checked) {
                    field.disabled = false;
                } else {
                    field.disabled = true;
                }
            });
        }

        checkbox.addEventListener('change', update);
        update();
    }
</script>
{% endblock %}
