<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beacon{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/uikit.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column h-100">
    <nav class="navbar navbar-expand-lg dash-nav">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <span class="brand-dot"></span>
                Beacon
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="dashNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/monitors"><i class="bi bi-activity"></i>Monitors</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-sliders"></i>Settings</a></li>
                    <div class="nav-divider d-none d-lg-block"></div>
                    <li class="nav-item"><a class="nav-link nav-logout" href="/logout"><i class="bi bi-arrow-right-square"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="theme-main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer mt-auto py-3">
        <div class="container text-center">
            <span class="text-muted small">
                © Beacon. {{ version }}
            </span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
