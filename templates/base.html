<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beacon{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column h-100">
    <style>
        :root {
            --c-bg: #f7f8fa;
            --c-surface: #ffffff;
            --c-surface-2: #f0f2f5;
            --c-border: rgba(0, 0, 0, 0.07);
            --c-border-strong: rgba(0, 0, 0, 0.12);
            --c-text: #0f1117;
            --c-text-2: #6b7280;
            --c-text-3: #9ca3af;
            --c-accent: #6366f1;
            --c-accent-light: rgba(99, 102, 241, 0.1);
            --c-accent-hover: #4f52e0;
            --c-success: #10b981;
            --c-success-light: rgba(16, 185, 129, 0.1);
            --c-danger: #ef4444;
            --c-danger-light: rgba(239, 68, 68, 0.1);
            --c-warning: #f59e0b;
            --c-warning-light: rgba(245, 158, 11, 0.1);
            --c-nav-bg: #0f1117;
            --c-nav-border: rgba(255, 255, 255, 0.06);
            --r: 10px;
            --r-lg: 16px;
            --r-pill: 100px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0, 0, 0, 0.04);
            --font: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            font-size: 0.9375rem;
            background: var(--c-bg);
            color: var(--c-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 900px;
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--c-border-strong);
            border-radius: 99px;
        }

        /* ── Nav ── */
        .dash-nav {
            background: var(--c-nav-bg);
            border-bottom: 1px solid var(--c-nav-border);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
        }

        .dash-nav .container {
            display: flex;
            align-items: center;
            height: 56px;
        }

        .dash-nav .navbar-brand {
            color: #fff !important;
            font-weight: 600;
            font-size: 0.9375rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            padding: 0;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--c-accent);
            display: inline-block;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.7);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .dash-nav .navbar-toggler {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .dash-nav .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255,255,255,0.75%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        .dash-nav .navbar-collapse {
            flex-grow: 0;
            margin-left: auto;
        }

        .dash-nav .navbar-nav {
            gap: 2px;
            flex-direction: row;
            align-items: center;
        }

        .dash-nav .nav-link {
            color: rgba(255, 255, 255, 0.55) !important;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 6px 10px !important;
            border-radius: 7px;
            transition: color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .dash-nav .nav-link i {
            font-size: 0.875rem;
        }

        .dash-nav .nav-link:hover {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.08);
        }

        .dash-nav .nav-link.active {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.1);
        }

        .dash-nav .nav-link.nav-logout {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        .dash-nav .nav-link.nav-logout:hover {
            color: rgba(255, 255, 255, 0.7) !important;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-divider {
            width: 1px;
            height: 18px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }

        /* ── Main ── */
        .theme-main {
            padding: 2rem 0 3rem;
        }

        .theme-page {
            padding-top: 0.25rem;
        }

        .page-title {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--c-text);
            margin-bottom: 1.5rem;
            line-height: 2rem;
        }

        /* ── Cards ── */
        .theme-card {
            background: var(--c-surface);
            /* border: 1px solid var(--c-border); */
            border: medium none;
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            text-wrap-mode: nowrap;
        }

        .theme-card .card-body {
            padding: 1.25rem 1rem;
        }

        .section-label {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--c-text-3);
            margin-bottom: 1rem;
        }

        /* ── Buttons ── */
        .btn-uptime {
            background: var(--c-accent);
            border: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.8125rem;
            padding: 7px 14px;
            border-radius: var(--r);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
        }

        .btn-uptime:hover {
            background: var(--c-accent-hover);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-uptime:active {
            transform: translateY(0);
        }

        .btn-uptime.btn-sm {
            padding: 5px 11px;
            font-size: 0.75rem;
        }

        /* ── Form controls ── */
        .theme-main .form-control,
        .theme-main .form-select {
            border: 1px solid var(--c-border-strong);
            border-radius: var(--r);
            font-family: var(--font);
            font-size: 0.875rem;
            color: var(--c-text);
            background: var(--c-surface);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .theme-main .form-control:not(.form-control-sm) {
            padding: 9px 13px;
        }

        .theme-main .form-control-sm,
        .theme-main .form-select-sm {
            padding: 6px 10px;
            font-size: 0.8125rem;
        }

        .theme-main .form-control:focus,
        .theme-main .form-select:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px var(--c-accent-light);
            outline: none;
        }

        .theme-main .form-label.small {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--c-text-2);
            margin-bottom: 5px;
            display: block;
        }

        .theme-main .form-control:disabled {
            background-color: var(--c-bg);
            opacity: 1;
        }

        /* ── Tables ── */
        .theme-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .theme-table thead th {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--c-text-3);
            padding: 10px 16px;
            border-bottom: 1px solid var(--c-border);
            background: var(--c-surface);
            white-space: nowrap;
        }

        .theme-table tbody tr {
            transition: background 0.1s;
            border-bottom: 1px solid var(--c-border);
        }

        .theme-table tbody tr:last-child {
            border-bottom: none;
        }

        .theme-table tbody tr:hover {
            background: var(--c-surface-2);
        }

        .theme-table tbody td {
            padding: 13px 16px;
            vertical-align: middle;
        }

        /* ── Status badges ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            border-radius: var(--r-pill);
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .status-badge .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-up {
            background: var(--c-success-light);
            color: var(--c-success);
        }

        .status-up .dot {
            background: var(--c-success);
            box-shadow: 0 0 5px var(--c-success);
        }

        .status-down {
            background: var(--c-danger-light);
            color: var(--c-danger);
        }

        .status-down .dot {
            background: var(--c-danger);
        }

        .status-unknown {
            background: var(--c-surface-2);
            color: var(--c-text-3);
        }

        .status-unknown .dot {
            background: var(--c-text-3);
        }

        .status-self {
            background: var(--c-accent-light);
            color: var(--c-accent);
        }

        .status-self .dot {
            background: var(--c-accent);
            box-shadow: 0 0 5px var(--c-accent);
        }

        .status-live {
            background: var(--c-success-light);
            color: var(--c-success);
        }

        .status-live .dot {
            background: var(--c-success);
            box-shadow: 0 0 5px var(--c-success);
        }

        .status-dead {
            background: var(--c-danger-light);
            color: var(--c-danger);
        }

        .status-dead .dot {
            background: var(--c-danger);
            box-shadow: 0 0 5px var(--c-danger);
        }

        .status-paused {
            background: var(--c-surface-2);
            color: var(--c-text-2);
        }

        /* ── Source badge ── */
        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: var(--r-pill);
            font-size: 0.6875rem;
            font-weight: 500;
        }

        .source-self {
            background: var(--c-accent-light);
            color: var(--c-accent);
        }

        .source-peer {
            background: var(--c-surface-2);
            color: var(--c-text-2);
        }

        /* ── Empty state ── */
        .empty-state {
            padding: 4rem 1.5rem;
            text-align: center;
            color: var(--c-text-3);
        }

        .empty-state .empty-icon {
            font-size: 2.25rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.875rem;
            margin: 0;
        }

        .empty-state a {
            color: var(--c-accent);
            text-decoration: none;
            font-weight: 500;
        }

        .empty-state a:hover {
            text-decoration: underline;
        }

        /* ── Mono code ── */
        code {
            font-family: var(--font-mono);
            font-size: 0.8em;
            background: var(--c-surface-2);
            padding: 1px 5px;
            border-radius: 4px;
            color: var(--c-text);
        }

        /* ── Outline buttons ── */
        .btn-ghost {
            background: var(--c-bg);
            border: 1px solid var(--c-border-strong);
            color: var(--c-text-2);
            font-size: 0.75rem;
            font-weight: 500;
            padding: 5px 11px 3px;
            border-radius: var(--r);
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-family: var(--font);
            line-height: 1.4;
        }

        .btn-ghost:hover {
            background: var(--c-surface-2);
            border-color: var(--c-border-strong);
            color: var(--c-text);
        }

        .btn-ghost.danger:hover {
            background: var(--c-danger-light);
            border-color: rgba(239, 68, 68, 0.25);
            color: var(--c-danger);
        }

        .btn-ghost.warning:hover {
            background: var(--c-warning-light);
            border-color: rgba(245, 158, 11, 0.25);
            color: var(--c-warning);
        }

        .btn-ghost.success:hover {
            background: var(--c-success-light);
            border-color: rgba(16, 185, 129, 0.25);
            color: var(--c-success);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-fadeup {
            animation: fadeUp 0.3s ease both;
        }

        .anim-delay-1 {
            animation-delay: 0.05s;
        }

        .anim-delay-2 {
            animation-delay: 0.1s;
        }

        .anim-delay-3 {
            animation-delay: 0.15s;
        }

        /* Override Bootstrap badge */
        .theme-main .badge {
            font-weight: 500;
        }
    </style>

    <nav class="navbar navbar-expand-lg dash-nav">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <span class="brand-dot"></span>
                Beacon
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="dashNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/monitors"><i class="bi bi-activity"></i>Monitors</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-sliders"></i>Settings</a></li>
                    <div class="nav-divider d-none d-lg-block"></div>
                    <li class="nav-item"><a class="nav-link nav-logout" href="/logout"><i class="bi bi-arrow-right-square"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="theme-main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer mt-auto py-3">
        <div class="container text-center">
            <span class="text-muted small">
                © Beacon. {{ version }}
            </span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
